  body: `<p>Hi there -</p>
<p>Thank you for your patience. We've been quiet for a while, but we've been building something behind the scenes.</p>
<p>Starting today, you'll receive a daily email from me with two things: a concept from our trading methodology, and a summary of what changed in the market overnight. These emails are designed to take 2 minutes to read and give you one actionable idea per day.</p>
<p>Today's concept: <strong>The MACD Four Seasons</strong>.</p>
<p>Most traders look at their charts and see noise. Green candles, red candles, a mess of indicators fighting for attention.</p>
<p>What if I told you the market has seasons — just like the year — and that recognizing which season you're in is the single most important thing you can do before placing a trade?</p>
<p>The MACD Four Seasons is a framework I developed to classify market conditions into four distinct phases:</p>
<ul>

<li><strong>Spring</strong> — the pain has stopped. Price is recovering. This is planting season — we stalk early long entries using the Supported Spring Crossing (SSC).</li>
<li><strong>Summer</strong> — the trend is established and strong. We hold positions, add on dips, and let the Kata 2 pattern do its work.</li>
<li><strong>Fall</strong> — momentum is decaying. Time to harvest. We tighten stops and prepare for winter.</li>
</ul>
<p>The key insight: <strong>you don't need to predict what's coming. You just need to recognize what season you're in right now</strong> — and align your strategy accordingly.</p>

{
  day: 2, concept: "Zero State", week: 1, hasCta: false,
  subject: "What to expect from these daily emails",
  body: `<p>Hi there -</p>
<p>Yesterday I mentioned we're bringing back daily emails. Today I want to tell you exactly what each one will look like — and share one of the most important concepts I teach.</p>
<p>Each email has two sections: a <strong>concept</strong> and a <strong>what changed</strong>. The concept is a piece of our trading methodology. The what changed is a snapshot of what the market did overnight. Together, they take about 2 minutes to read.</p>
<p>Today's concept: <strong>The Zero State</strong>.</p>
<p>Before I look at a single chart in the morning, I do something that might surprise you.</p>
<p>I sit down. I close my eyes. And I breathe.</p>
<p>Four counts in. Hold four. Four counts out. Hold four. Thirty times.</p>
<p>This is <strong>box breathing</strong> — the same technique Navy SEALs use to perform under extreme pressure. And it's the gateway to what I call the <strong>Zero State</strong>: a condition of calm, focused readiness where opposing mental states cancel each other out, leaving only pure presence.</p>
<p>Why does this matter for trading?</p>
<p>Because <strong>every bad trade starts with a bad state</strong>. You chase because you're anxious. You hold too long because you're greedy. You revenge-trade because you're angry. The market didn't beat you — your state did.</p>

<p>And there's a non-negotiable rule that follows from it: <strong>if you lose the Zero State during a trade — just get out.</strong> No thinking. No rationalizing. Exit. Reset. Come back when you're ready.</p>`,

  body: `<p>Hi there -</p>
<p>One of the most common mistakes I see in newer traders: they see a stock moving and they jump in.</p>
<p>No plan. No frame. No stop. Just FOMO.</p>
<p>The professionals I train do the opposite. They separate every potential trade into three distinct phases — and they never skip one.</p>
<p><strong>Setup</strong> — the precondition. The market is showing a recognizable pattern. A volatility compression. A pullback to support. A MACD season transition. This is observation, not action.</p>
<p><strong>Signal</strong> — the trigger. Something mathematical and objective fires. The MACD hooks upward. Price closes above the prior bar's high. A specific coded condition is met. There's no interpretation here — it either fired or it didn't.</p>
<p><strong>Entry</strong> — the execution. You commit capital at a pre-defined price with a pre-defined stop and a pre-defined target. The entry cannot exist without the other two.</p>
<p>I teach this with a sniper analogy: the setup is choosing your position. The signal is the target entering the crosshairs. The entry is pulling the trigger. <strong>A sniper who chases his target across an open field is a dead sniper.</strong></p>
<p>Once you're in, the <strong>Rule of Four</strong> takes over:</p>
<ul>
<li><strong>Give it one</strong> — move to no-lose at +1R</li>
<li><strong>Aim for three</strong> — that's your rational target</li>
<li><strong>Settle for two</strong> — lock in +1.5R if momentum stalls</li>
<li><strong>Keep one</strong> — never give back more than one R from your peak</li>
</ul>`,

  body: `<p>Hi there -</p>
<p>Ask a new trader about their last trade and they'll tell you what they bought and when they bought it.</p>
<p>Ask a professional the same question and the first thing out of their mouth is: <strong>"How much did I risk?"</strong></p>
<p>Position sizing is the least glamorous and most important skill in trading. It's the difference between a bad week and a blown account.</p>
<p>Here's the framework I teach:</p>
<p><strong>1R = the amount you're willing to lose on a single trade.</strong> Not a percentage of your portfolio. A fixed dollar amount that you've calculated from your system's edge and your own psychology.</p>
<p>If your account is $50,000 and you're risking 0.5% per trade, your 1R = $250. If your initial stop is $0.10 from entry, you buy 2,500 shares. Not 100. Not 10,000. Exactly 2,500.</p>
<p>This is not optional math. This is survival math.</p>
<p>The professionals I work with in Small Group Coaching think in terms of <strong>pR</strong> (position R — the risk defined by your position and stop placement) and <strong>xR</strong> (execution R — your actual result measured in R-multiples). Every trade gets logged this way. After 50 trades, you know your edge with mathematical precision.</p>
<p>The question that matters isn't "will this trade work?" It's: <strong>"If I took 5 losses in a row tomorrow, would I still be in the game?"</strong></p>`,

  body: `<p>Hi there -</p>
<p>I've met traders who win 70% of their trades and lose money. And traders who win 35% and are consistently profitable.</p>
<p>The difference? <strong>Expectancy.</strong></p>
<p>Expectancy is the average amount you can expect to make (or lose) per dollar risked, per trade, over time. It's calculated from your win rate, your average win size, and your average loss size.</p>
<p>Here's the formula:<br>
<strong>Expectancy = (Win% × Avg Win) − (Loss% × Avg Loss)</strong></p>
<p>A trader who wins 40% of the time with average wins of +3R and average losses of -1R has an expectancy of +0.6R per trade. Over 100 trades, that's +60R. That's a serious edge.</p>
<p>A trader who wins 70% with +0.5R wins and -2R losses has an expectancy of -0.25R. Over 100 trades, that's -25R. They're going broke slowly while feeling like they're winning.</p>

  body: `<p>Hi there -</p>
<p>People sometimes ask: "If you're good at trading, why do you teach?"</p>
<p>It's a fair question. The answer begins with this: we could just trade.</p>
<p>Many of us do. Our senior mentors and I have built independent, long-term success as traders and system developers. But trading in isolation is not enough.</p>
<p><strong>We teach because we are lifelong learners.</strong> There is no better way to refine your edge than by teaching it to someone else. Teaching is the most rigorous form of learning. It forces precision. It reveals blind spots. It demands honesty.</p>
<p>We also teach because trading is a <strong>craft</strong> — like sailing, or surgery, or golf. It has three domains that must be integrated:</p>
<ul>

<p>A stock can be in Summer on the daily chart and Winter on the weekly. Which one is right?</p>
<p>Both. And knowing how to read them together is the difference between trading <em>with</em> the trend and trading <em>against</em> it.</p>
<p>I teach a framework called <strong>MTFMLA</strong> — Multi-Timeframe Multi-Level Analysis. The idea is fractal: the same patterns that appear on a 5-minute chart appear on a monthly chart. The physics are the same. Only the scale changes.</p>
<p>Here's how I stack them:</p>
<ul>
<li><strong>Monthly/Weekly</strong> — the strategic view. This is the ocean current. You don't fight it.</li>
<li><strong>Daily</strong> — the tactical view. This is where you identify setups and classify MACD seasons.</li>
<li><strong>Intraday (5-min to 60-min)</strong> — the execution view. This is where you time entries and manage stops.</li>
</ul>
<p>The rule is simple: <strong>trade in the direction of the higher timeframe.</strong> A daily Spring signal that aligns with a weekly Summer is high-probability. A daily Spring signal against a weekly Winter is a counter-trend trade — smaller size, tighter stops, lower expectation.</p>
<p>I use Regression Lines (RL10, RL30, RL90, RL270) to read each timeframe at a glance. When all four regression lines are rising and stacked in order — that's what I call the <strong>Market Mosaic</strong> aligned. That's when I size up.</p>`,

  body: `<p>Hi there -</p>
<p>Early in my career, I traded from instinct. I was smart, I was fast, and I lost money consistently.</p>
<p>What changed? I wrote it down.</p>
<p>Not a 50-page business plan. <strong>One page.</strong> My markets. My setups. My signals. My stops. My position sizing rules. My maximum daily loss. My morning routine. My exit protocol.</p>
<p>One page that I read every single morning before the market opens.</p>
<p>Here's what your trading plan needs:</p>
<ul>
<li><strong>Your edge</strong> — what specific pattern or system gives you positive expectancy? Name it.</li>
<li><strong>Your population</strong> — which symbols do you trade and why? Don't say "everything."</li>
<li><strong>Your risk rules</strong> — maximum risk per trade, per day, per week. Non-negotiable numbers.</li>
<li><strong>Your morning script</strong> — the 11 questions you answer before touching a single order. (What's the market classification? What season are my targets in? What setups are forming? Am I in the Zero State?)</li>
<li><strong>Your circuit breaker</strong> — what triggers you to stop trading for the day? Two consecutive losses? A dollar amount? A feeling?</li>
</ul>
<p>The plan doesn't need to be perfect. It needs to exist. <strong>A bad plan executed with discipline beats no plan executed with genius.</strong></p>

  subject: "The trade you don't review is the trade you'll repeat",
  body: `<p>Hi there -</p>
<p>I can tell you the exact entry, exit, and R-multiple of a trade I took 15 years ago.</p>
<p>Not because I have a perfect memory. Because I wrote it down.</p>
<p><strong>Journaling is the highest-leverage activity in trading.</strong> Not analysis. Not scanning. Not backtesting. Journaling. Because it's the only activity that turns experience into wisdom.</p>
<p>Here's what I capture for every trade:</p>
<ul>
<li><strong>The setup</strong> — what pattern did I see? What season was it? What timeframe?</li>
<li><strong>The signal</strong> — what specifically triggered my entry?</li>
<li><strong>The result</strong> — entry, exit, R-multiple. Cold numbers.</li>
<li><strong>The state</strong> — what was I feeling? Confident? Anxious? Rushed? Bored?</li>
<li><strong>The lesson</strong> — what would I do differently? What would I repeat?</li>
</ul>
<p>Over time, patterns emerge. Not market patterns — <em>your</em> patterns. You'll discover that you lose money on Mondays. Or that you overtrade after a big win. Or that your best trades come from one specific setup in one specific season.</p>
<p>The journal doesn't judge. It reveals. And what it reveals is the most valuable data in your trading business: <strong>the truth about how you actually trade.</strong></p>`,

  day: 11, concept: "MACD Four Seasons", week: 2, hasCta: false,
  subject: "The one pattern that tells you it's time to get out",
  body: `<p>Hi there -</p>
<p>Today I want to zoom in on the most dangerous season transition — and the pattern that exploits it.</p>
<p><strong>The Collapsing Dragon.</strong></p>
<p>Here's the scenario: a stock has been in Winter (downtrend). The MACD starts to hook up — it looks like Spring is coming. Hope returns. Buyers step in early.</p>
<p>Then it fails. The MACD rolls back down before reaching the zero line. Winter resumes — but now with trapped longs feeding the decline.</p>
<p>This Winter → Spring → Winter transition is one of the most reliable short setups I've found. The "first mouse" buyers just got caught, and their forced selling accelerates the next leg down.</p>
<p>How do you spot it?</p>
<ul>
<li>MACD was below zero (Winter) and started rising (Spring)</li>
<li>The rise stalls well below the zero line</li>
<li>The slope reverses back downward — that's the collapse</li>
<li>If the MACD was outside the Red River during Winter, the energy is even higher</li>
</ul>
<p><strong>The Collapsing Dragon is an "instant short" signal.</strong> I use inverse ETFs to execute it in retirement accounts. Same pattern, long position.</p>
<p>The opposite pattern exists too — a bullish failed breakdown that becomes a powerful long entry. But the Dragon is the one I see traders miss most often, because they're so eager for Spring they ignore the evidence of failure.</p>`,
  whatChanged: `<p>Collapsing Dragon watch:</p>
<p><span class="wc-stat wc-winter">ARKK — Dragon confirmed (3rd day below zero after failed Spring)</span></p>
<p><span class="wc-stat wc-winter">XBI — Dragon forming (Spring attempt stalling at -0.3)</span></p>
<p>Inverse ETF opportunities active for both.</p>`,

  body: `<p>Hi there -</p>

<p>You close your eyes. You picture an owl perched on a branch in the forest at dusk. The owl is perfectly still. Watching. Waiting. It offers no advice. It makes no judgment. It simply observes with infinite patience.</p>
<p>That owl is your ideal trading self.</p>
<p>The owl doesn't chase. It doesn't panic. It doesn't revenge-trade after a missed opportunity. It waits for the right moment, and when that moment comes, it acts with absolute precision.</p>

  body: `<p>Hi there -</p>
<p>Let me walk you through a real trade frame using the Ready Fire Aim approach.</p>
<p>The stock is CLF, trading at $26.40. It's 10:00 AM. SPY is recovering from an early dip. CLF has pulled back to support and formed a doji on the 5-minute chart — the telltale sign of indecision at a turning point.</p>
<p><strong>Ready:</strong> CLF is on my watchlist. It's a large-cap "cow" — slow, liquid, orderly. The daily chart is in Summer. SPY is confirming an intraday reversal. The setup is valid.</p>
<p><strong>Fire:</strong> A green candle closes above the doji high. I enter at $26.41 — one cent above the confirmation candle. My initial stop goes at $26.31 — ten cents below entry. That's my 1R.</p>
<p><strong>Aim:</strong> My target is the prior intraday high at $26.80 — that's nearly 4R. I manage the trade using the Rule of Four. At +1R ($26.51), I move my stop to entry. At +2R ($26.61), I lock in +1.5R.</p>
<p>If I'm risking $250 per trade, I buy 2,500 shares ($250 / $0.10 per share). The position is $66,000 notional — but my maximum loss is exactly $250.</p>

{
  day: 14, concept: "Position Sizing", week: 2, hasCta: true,
  subject: "Why I sometimes trade 10 shares of a $200 stock",
  body: `<p>Hi there -</p>
<p>New traders often ask me: "How many shares should I buy?"</p>
<p>The answer is always the same: <strong>let the stop tell you.</strong></p>
<p>If a stock has a tight setup with an initial stop of $0.10, you can buy a lot of shares for a given risk budget. If the stop is $2.00, you buy far fewer. The risk stays constant. The share count is just the output.</p>
<p>Here's where it gets interesting: <strong>your position size is also a psychological signal.</strong></p>
<p>If 2,500 shares of CLF makes your heart race, the position is too big — regardless of what the math says. If 10 shares of a $200 stock feels boring, you might need to size up.</p>
<p>The goal is to find the size where you can execute your plan without emotional interference. Where a -1R loss is genuinely acceptable. Where you can hold through a pullback without tightening your stop too early.</p>
<p>In our coaching sessions, we use a progression I call <strong>4-3-2-1 sizing:</strong></p>
<ul>
<li><strong>4</strong> — paper trade until the setup frequency feels natural</li>
<li><strong>3</strong> — trade with 25% of your intended size (quarter position)</li>
<li><strong>2</strong> — move to 50% when quarter feels routine</li>
<li><strong>1</strong> — full size when half-size is boring</li>
</ul>
<p>Boring is the goal. If your position size makes you feel something, it's too big.</p>`,

<p>High ATR (wider stops, smaller share counts): <span class="wc-stat">TSLA 3.4%</span><span class="wc-stat">COIN 4.1%</span><span class="wc-stat">MARA 6.2%</span></p>`,

  day: 15, concept: "Expectancy", week: 3, hasCta: true,
  subject: "What 100 trades will teach you that 1 trade never will",
  body: `<p>Hi there -</p>
<p>One trade is a coin flip. Ten trades are a story. <strong>One hundred trades are the truth.</strong></p>
<p>This is why I insist that every trader I coach commits to a <strong>20-Trade Challenge</strong> before making any changes to their system. Here's the deal:</p>
<ul>
<li>Pick one setup. Just one.</li>
<li>Trade it 20 times with identical rules. Same entry, same stop, same sizing.</li>
<li>Log every result in R-multiples. No exceptions.</li>
<li>After 20 trades, calculate your expectancy.</li>
</ul>
<p>What you'll discover might surprise you. Maybe your system has a +0.4R expectancy — modest but real. Maybe it's negative and you need to adjust your stops. Maybe your win rate is lower than you thought but your average win is bigger.</p>
<p>The 20-Trade Challenge strips away narrative and leaves you with data. And data is the only honest mirror in trading.</p>
<p>I use two quality metrics to evaluate a system:</p>
<ul>
<li><strong>SQN (System Quality Number)</strong> — measures the system's edge independent of the trader</li>
<li><strong>TQN (Trader Quality Number)</strong> — measures how well you personally execute the system</li>
</ul>
<p>The gap between SQN and TQN is your execution cost. Narrowing that gap is the real work of becoming a professional.</p>`,

  body: `<p>Hi there -</p>
<p>Most traders get bored when volatility drops. They start looking at their phones. They wander away from the screen.</p>
<p>That's exactly when I lean in.</p>
<p>Because <strong>low volatility doesn't mean low opportunity. It means the opportunity is loading.</strong></p>
<p>When Bollinger Bands narrow — what I call a <strong>Z3 Pinch</strong> — the market is telling you that a directional move is imminent. The energy is being stored. Sellers and buyers are in equilibrium. Something will break that balance, and when it does, the move will be fast.</p>
<p>The same principle applies at the individual stock level. A stock that has been trading in a tight range for 5 days, with declining volume and narrowing candles, is a coiled spring. I call this the <strong>"Compound Critical State"</strong> — multiple compression signals converging on the same symbol.</p>
<p>Here's how I prepare:</p>
<ul>
<li>Identify symbols in Compound Critical State (BB squeeze + low volume + range compression)</li>
<li>Frame the trade in BOTH directions — I don't predict which way. I prepare for both.</li>
<li>Set alerts at the range boundaries</li>
<li>When the breakout fires, enter in the breakout direction with a stop below the range</li>
</ul>
<p>The R:R on these trades is often exceptional because the stop is tight (narrow range) and the target is wide (energy release).</p>`,

  subject: "A 3-minute chart and a 30-minute chart walk into a bar...",
  body: `<p>Hi there -</p>
<p>One of the most common questions I get in coaching: "Ken, which timeframe should I use?"</p>
<p>My answer: <strong>at least three. Simultaneously.</strong></p>
<p>Here's a real scenario from a recent coaching session. A student was trading NVDA on the 5-minute chart. Great setup — morning hook, doji confirmation, textbook entry. The trade immediately went against him.</p>
<p>Why? Because on the 60-minute chart, NVDA was at resistance. And on the daily, it was in early Fall season. The student was trading a 5-minute Spring against a daily Fall. He was swimming upstream.</p>
<p>The fix wasn't a better 5-minute setup. It was <strong>checking the higher timeframes first.</strong></p>
<p>Here's the hierarchy I teach:</p>
<ul>
<li><strong>Step 1:</strong> What season is the weekly chart in? This sets your directional bias.</li>
<li><strong>Step 2:</strong> What season is the daily chart in? This tells you which setups to look for.</li>
<li><strong>Step 3:</strong> Use the intraday chart to time your entry. Don't let the intraday chart change your bias.</li>

  subject: "11 questions I answer every single morning",
  body: `<p>Hi there -</p>
<p>Every morning before the market opens, I run through 11 questions. The same 11. In the same order. Every day.</p>
<ol>
<li>Am I in the Zero State? (If no, stop. Breathe. Start over.)</li>
<li>What is the current market classification?</li>
<li>What season is SPY in on the daily chart?</li>
<li>Did anything change overnight? (Gaps, news, futures)</li>
<li>Which symbols on my watchlist have active setups?</li>
<li>For each setup: what's the signal? What's the entry? What's the stop?</li>
<li>What's my R for each trade? Is it at least 2:1?</li>
<li>How much total am I willing to risk today?</li>
<li>What's my circuit breaker? (The loss level where I stop for the day)</li>
<li>Are there any calendar events that could spike volatility?</li>
<li>What's my one focus for today? (Not five things. One.)</li>
</ol>

  subject: "The market rewards this one thing above all else",
  body: `<p>Hi there -</p>
<p>I've been trading for over 40 years. I've mentored hundreds of traders. And if I had to name the single quality that separates those who make it from those who don't, it's this:</p>
<p><strong>Consistency.</strong></p>
<p>Not brilliance. Not insight. Not even discipline — because discipline implies white-knuckling through something difficult.</p>
<p>Consistency is quieter than discipline. It's showing up every morning and running the script. Logging every trade. Reviewing every week. Making small adjustments. Doing the boring work that compounds.</p>
<p>I call it the <strong>Consistency Cycle:</strong></p>
<ul>
<li>Trade your plan → Journal the result → Review the data → Adjust the plan → Trade the plan</li>
</ul>
<p>It's not sexy. Nobody posts their Consistency Cycle on social media. But over 100 trades, 500 trades, 1,000 trades — it's the only thing that works.</p>
<p>The traders in our Foundations course who succeed aren't the ones who learn the fastest. They're the ones who <strong>keep showing up</strong>. They do the 20-Trade Challenge. They submit their journals. They ask questions in the Q&A sessions. They do the work.</p>

  body: `<p>Hi there -</p>
<p>I want to share a story from one of our Small Group Coaching cohorts.</p>
<p>A trader — I'll call him Tom — had been struggling for months. His system was sound. His entries were good. But he kept getting stopped out on trades that "should have worked."</p>

<p>Nine out of ten were long entries in Fall season.</p>
<p>Tom's system was generating valid signals. But he was executing them in the wrong season. He was planting seeds in October and wondering why nothing grew.</p>
<p>We made one change: <strong>before entering any trade, check the MACD season on the daily chart. Only take long entries in Spring or Summer. Only take short entries in Fall or Winter.</strong></p>

<p>This is the power of a simple filter. One question — "What season am I in?" — eliminated most of his losing trades.</p>
<p>We see this pattern repeatedly in coaching. The fix is rarely a new indicator or a new strategy. It's usually <strong>one simple alignment check</strong> that the trader was skipping.</p>`,

{
  day: 22, concept: "Zero State", week: 4, hasCta: true,
  subject: "What to do when you've already broken your rules",
  body: `<p>Hi there -</p>
<p>Let's be honest. You're going to break your rules.</p>
<p>Not because you're weak. Because you're human. The question isn't whether it will happen — it's <strong>what you do next.</strong></p>
<p>Here's the protocol I teach:</p>
<p><strong>Step 1: Recognize.</strong> The moment you feel that pit in your stomach — the "oh no, I just chased that" feeling — the recognition IS the signal. Don't push it away. Don't rationalize. Acknowledge it.</p>
<p><strong>Step 2: Execute the "Just Get Out" rule.</strong> This is non-negotiable. If you've lost the Zero State — if you entered without a frame, or moved your stop, or doubled down out of anger — exit the trade. Now. Not at the next support level. Not when it gets back to breakeven. Now.</p>
<p><strong>Step 3: Step away.</strong> Close the charts. Walk to the window. Do 10 box breaths. This isn't weakness — it's the most professional thing you can do.</p>
<p><strong>Step 4: Debrief.</strong> In your journal, answer: What triggered the rule break? What was I feeling? What was the market doing? What will I do differently next time?</p>
<p><strong>Step 5: Re-enter the Zero State.</strong> Run your full reset protocol. Owl Meditation. Box breathing. Morning script — even if it's 2 PM. Only when you're back in the Zero State can you trade again.</p>
<p>This process is the <strong>4-Step Balancing Protocol</strong>: Awareness → Acknowledgment → Adjustment → Assessment. It's the engine of self-correction.</p>`,

  subject: "5 setups you can spot in 60 seconds",
  body: `<p>Hi there -</p>
<p>I've been teaching trade setups for decades. But there are five that I come back to more than any others — because they work, they're simple, and you can spot them quickly.</p>
<ul>
<li><strong>The Morning Hook</strong> — stock opens, sells off hard in the first 30-60 minutes, then forms a doji or hammer at support. The hook up is your signal. Enter on the green candle above the doji.</li>
<li><strong>The Shelf</strong> — price is in an uptrend and pauses. Several dojis or narrow-range candles form a flat shelf. The breakout candle closing above the shelf is your signal.</li>
<li><strong>The SSC (Supported Spring Crossing)</strong> — MACD transitions from Winter to Spring after a Harsh Winter selloff. The slope change is the signal. This is the highest-probability seasonal entry.</li>
<li><strong>The OR5 Breakout</strong> — first 5-minute candle establishes the opening range. Price breaking above the high of that candle is the signal. Simple and fast.</li>
<li><strong>The Double Bottom (W)</strong> — two tests of the same support level. The second test holds. Enter on the green candle after the second low is confirmed.</li>
</ul>
<p>Each of these takes less than 10 seconds to identify. The preparation — knowing your R, setting your stop, sizing your position — is where the real time goes.</p>
<p>One setup, mastered and repeated consistently, will outperform five setups executed sloppily. Pick one. Run your 20-Trade Challenge. Then add the next.</p>`,

{
  day: 24, concept: "Position Sizing", week: 4, hasCta: true,
  subject: "How one number saved a trader's account",
  body: `<p>Hi there -</p>
<p>In coaching last year, a trader I'll call Eric shared something that stopped the room.</p>
<p>"I was risking 5% per trade," he said. "I thought I was being conservative. Then I hit four losses in a row and I was down 20%. I panicked. I doubled my size to make it back. Two more losses. Down 40% in a week."</p>
<p>Eric is smart. Eric had a system. Eric's problem was one number: <strong>his risk per trade was too high.</strong></p>
<p>We worked through the math together:</p>
<ul>
<li>At 5% risk per trade, 4 consecutive losses = -20%. Recoverable, but psychologically devastating.</li>
<li>At 1% risk per trade, 4 consecutive losses = -4%. Barely noticeable. You keep trading your system without flinching.</li>
<li>At 0.5% risk per trade, 4 consecutive losses = -2%. You might not even feel it.</li>
</ul>
<p>Eric dropped to 0.5% risk per trade. His P&L slowed down — but so did his anxiety. For the first time in months, he could execute his system without emotional interference.</p>
<p>Three months later, his expectancy was positive (+0.6R), his TQN matched his SQN, and he started gradually increasing size using the 4-3-2-1 protocol.</p>
<p><strong>The number that saved his account wasn't a price target or a stop level. It was his risk percentage.</strong></p>`,

  body: `<p>Hi there -</p>
<p>Last month I took 47 trades. I won 19 and lost 28. That's a 40% win rate.</p>
<p>My P&L was positive. Significantly.</p>

<li>28 losses × average -0.7R = -19.6R</li>
<li><strong>Net: +33.6R</strong></li>
</ul>
<p>This is the power of asymmetric returns. My average win was 4x my average loss. The win rate is almost irrelevant.</p>
<p>How did I keep my average loss at -0.7R when my initial stop is always -1R? Two things:</p>
<ol>

let currentDay = 0;

function buildGridNav() {
  const grid = document.getElementById('gridNav');
  grid.innerHTML = '';
  emails.forEach((e, i) => {
    const btn = document.createElement('button');
    btn.textContent = e.day;
    btn.onclick = () => showDay(i);
    if (i === 0) btn.classList.add('active');
    // CTA days get a distinct border color
    if (e.hasCta) {
      btn.style.borderColor = '#1a1a2e';
      btn.style.borderWidth = '2px';
      btn.title = 'CTA day';
    }
    grid.appendChild(btn);
  });
}

function renderEmail(idx) {
  const e = emails[idx];
  const ctaBadge = e.hasCta
    ? '<span class="concept-tag" style="background:#1a1a2e;color:#8ecae6;">CTA</span>'
    : '<span class="concept-tag" style="background:#f0f0f0;color:#999;">No CTA</span>';
  const membershipLine = (e.hasCta && e.cta && e.cta.membership)
    ? '<div class="cta-membership">Included with membership</div>'
    : '';
  const ctaHtml = e.hasCta && e.cta ? `<div class="cta-block">
      <p>Recommended resource</p>
      <div class="cta-title">${e.cta.title}</div>
      <p class="cta-sub">${e.cta.sub}</p>
      ${membershipLine}
      <div class="cta-price">${e.cta.price}</div>
      <a href="#" class="cta-btn">View in store</a>
    </div>` : '';
  const bridgeHtml = e.hasCta && e.bridge ? e.bridge : '';
  return `<div class="email-container">
  <div class="email-header">
    <div class="email-subject">${e.subject}</div>
    <div class="email-meta">
      <span class="email-sender">Dr. Ken Long</span>
      <span>&lt;ken@owlgrouptrading.com&gt;</span>
      <span class="concept-tag">${e.concept}</span>
      <span class="concept-tag">Week ${e.week}</span>
      ${ctaBadge}
      <span style="margin-left:auto; font-size:12px; color:#999;">Day ${e.day}</span>
    </div>
  </div>
  <div class="email-body">
    ${e.body}
    <div class="what-changed">
      <h3>What Changed Today</h3>
      ${e.whatChanged}
    </div>
    ${bridgeHtml}
    ${ctaHtml}
    <div class="signoff">
      <p>Respectfully,</p>
      <p class="name">Ken Long</p>
      <p>Founder, Tortoise Capital → Owl Group Trading<br>OwlGroupTrading.com</p>
      <p class="tagline">Learn by doing. Trade with clarity.</p>
    </div>
  </div>
</div>`;
}

function showDay(idx) {
  currentDay = idx;
  document.getElementById('emailContainer').innerHTML = renderEmail(idx);
  document.getElementById('dayNum').textContent = emails[idx].day;
  document.getElementById('dayInfo').textContent = emails[idx].concept + ' — Week ' + emails[idx].week;
  document.querySelectorAll('.grid-nav button').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

function nav(dir) {
  let next = currentDay + dir;
  if (next < 0) next = emails.length - 1;
  if (next >= emails.length) next = 0;
  showDay(next);
}

buildGridNav();
showDay(0);
</script>
